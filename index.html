<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langit Nusantara Alliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Inter:wght=400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            500: '#0070f3',
                            600: '#0062d1',
                            950: '#021833',
                        },
                        accent: {
                            teal: '#14b8a6',
                            purple: '#8b5cf6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        #appContainer {
            background-image: url('https://i.imgur.com/3MnEBgl.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased flex items-center justify-center">

    <div class="w-full max-w-md h-[100vh] sm:h-[840px] text-slate-100 flex flex-col justify-between relative overflow-hidden sm:rounded-[40px] sm:shadow-2xl sm:border sm:border-slate-800/60" id="appContainer">
        
        <header class="p-6 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-white/30 shadow-lg shrink-0 flex items-center justify-center bg-slate-900">
                    <img src="https://i.imgur.com/b5cUkSv.jpeg" alt="Langit Nusantara Alliance" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/0070f3/ffffff?text=LNA'">
                </div>
                <span class="text-xs font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent leading-tight">
                    Langit Nusantara<br>Alliance
                </span>
            </div>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center px-6 relative z-10">
            <div class="w-full max-w-xs glass rounded-3xl p-6 shadow-2xl backdrop-blur-md flex flex-col items-center gap-6">
                <div class="text-center">
                    <h1 class="text-lg font-extrabold text-white tracking-wide">Selamat Datang</h1>
                    <p class="text-[10px] text-slate-300 font-medium mt-1">Silakan pilih menu layanan di bawah ini</p>
                </div>

                <div class="grid grid-cols-3 gap-4 w-full">
                    <!-- Tombol AOTM -->
                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center text-white text-xl shadow-lg shadow-cyan-500/10 group-hover:shadow-cyan-500/25 transition-all">
                            <i class="fa-solid fa-chart-simple"></i>
                        </div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase group-hover:text-cyan-400 transition-colors">
                            AOTM
                        </span>
                    </button>

                    <!-- Tombol Market (Mengarahkan ke market.html) -->
                    <a href="market.html" class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150 text-center">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-emerald-400 to-teal-600 flex items-center justify-center text-white text-xl shadow-lg shadow-emerald-500/10 group-hover:shadow-emerald-500/25 transition-all">
                            <i class="fa-solid fa-store"></i>
                        </div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase group-hover:text-emerald-400 transition-colors">
                            Market
                        </span>
                    </a>

                    <!-- Tombol Gallery -->
                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-purple-500 to-pink-600 flex items-center justify-center text-white text-xl shadow-lg shadow-purple-500/10 group-hover:shadow-purple-500/25 transition-all">
                            <i class="fa-solid fa-images"></i>
                        </div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase group-hover:text-purple-400 transition-colors">
                            Gallery
                        </span>
                    </button>
                </div>
            </div>
        </main>

        <footer class="p-6 text-center z-10">
            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-semibold">
                &copy; Langit Nusantara Alliance
            </p>
        </footer>

    </div>

</body>
</html>
