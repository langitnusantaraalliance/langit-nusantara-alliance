<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market - Langit Nusantara Alliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f7ff', 500: '#0070f3', 600: '#0062d1', 950: '#021833' },
                        accent: { teal: '#14b8a6', purple: '#8b5cf6' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); }
        #appContainer { background-image: url('https://i.imgur.com/3MnEBgl.jpeg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .notification-toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased flex items-center justify-center">

    <div class="w-full max-w-md h-[100vh] sm:h-[840px] text-slate-100 flex flex-col relative overflow-hidden sm:rounded-[40px] sm:shadow-2xl sm:border sm:border-slate-800/60" id="appContainer">
        
        <!-- VIEW 1: MENU UTAMA -->
        <div id="view-main" class="flex flex-col h-full justify-between">
            <header class="p-6 flex justify-between items-center z-10">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="text-white/80 hover:text-white mr-1 active:scale-90 transition-transform">
                        <i class="fa-solid fa-arrow-left text-lg"></i>
                    </a>
                    <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-white/30 shadow-lg shrink-0 flex items-center justify-center bg-slate-900">
                        <img src="https://i.imgur.com/b5cUkSv.jpeg" alt="LNA" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/0070f3/ffffff?text=LNA'">
                    </div>
                    <span class="text-xs font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent leading-tight">
                        Langit Nusantara<br>Alliance
                    </span>
                </div>
            </header>

            <main class="flex-grow flex flex-col items-center justify-center px-6 relative z-10">
                <div class="w-full max-w-xs glass rounded-3xl p-5 shadow-2xl backdrop-blur-md">
                    <div class="w-full space-y-3">
                        <button onclick="showToast('Fitur Buy Fleet sedang dalam pengembangan.')" class="w-full relative overflow-hidden group p-4 rounded-xl bg-gradient-to-br from-slate-950/80 to-brand-950/40 border border-slate-800/80 hover:border-brand-500/40 text-left transition-all duration-300 shadow-lg active:scale-[0.98] block cursor-pointer">
                            <div class="absolute -right-6 -bottom-6 w-16 h-16 bg-brand-500/10 rounded-full group-hover:scale-125 transition-transform duration-500"></div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-brand-500 to-blue-400 flex items-center justify-center text-white shrink-0 shadow-md overflow-hidden">
                                    <img src="https://i.imgur.com/kb7sMrX.png" alt="Buy" class="w-6 h-6 object-contain filter brightness-110" onerror="this.src='https://placehold.co/40x40/0070f3/ffffff?text=Buy'">
                                </div>
                                <div>
                                    <span class="text-[8px] font-bold text-brand-500 uppercase tracking-wider block">Beli Unit Baru</span>
                                    <h2 class="text-sm font-extrabold text-white group-hover:text-brand-500 transition-colors">Buy Fleet</h2>
                                </div>
                            </div>
                        </button>

                        <button onclick="toggleView()" class="w-full relative overflow-hidden group p-4 rounded-xl bg-gradient-to-br from-slate-950/80 to-accent-purple/20 border border-slate-800/80 hover:border-accent-purple/40 text-left transition-all duration-300 shadow-lg active:scale-[0.98] block cursor-pointer">
                            <div class="absolute -right-6 -bottom-6 w-16 h-16 bg-accent-purple/10 rounded-full group-hover:scale-125 transition-transform duration-500"></div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-accent-purple to-pink-500 flex items-center justify-center text-white shrink-0 shadow-md overflow-hidden">
                                    <img src="https://i.imgur.com/AHVCy7h.png" alt="Sell" class="w-6 h-6 object-contain filter brightness-110" onerror="this.src='https://placehold.co/40x40/8b5cf6/ffffff?text=Sell'">
                                </div>
                                <div>
                                    <span class="text-[8px] font-bold text-accent-purple uppercase tracking-wider block">Jual Unit Lama</span>
                                    <h2 class="text-sm font-extrabold text-white group-hover:text-accent-purple transition-colors">Sell Fleet</h2>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>
            </main>
        </div>

        <!-- VIEW 2: SELL FLEET -->
        <div id="view-sell" class="hidden flex-col h-full">
            <header class="sticky top-0 z-50 glass p-4 flex items-center gap-4">
                <button onclick="toggleView()" class="text-white hover:text-brand-500 transition-colors"><i class="fa-solid fa-arrow-left text-xl"></i></button>
                <h1 class="text-lg font-bold">Sell Fleet</h1>
            </header>
            <nav class="flex overflow-x-auto p-4 gap-4 border-b border-slate-800 bg-slate-950/50">
                <button class="text-xs font-bold text-white border-b-2 border-white pb-1 whitespace-nowrap">AIRBUS</button>
                <button class="text-xs font-bold text-slate-500 hover:text-slate-300 pb-1 whitespace-nowrap">BOEING</button>
                <button class="text-xs font-bold text-slate-500 hover:text-slate-300 pb-1 whitespace-nowrap">BOMBARDIER</button>
                <button class="text-xs font-bold text-slate-500 hover:text-slate-300 pb-1 whitespace-nowrap">EMBRAER</button>
            </nav>
            <main class="flex-grow p-4 space-y-3 overflow-y-auto">
                <div class="space-y-2">
                    <button onclick="toggleGroup('a220')" class="w-full bg-slate-900/80 p-4 rounded-xl border border-slate-800 flex justify-between items-center group glass">
                        <span class="font-bold text-sm tracking-wide">Airbus A220 Family</span>
                        <i class="fa-solid fa-chevron-down text-slate-500 group-hover:text-white transition-colors"></i>
                    </button>
                    <div id="a220" class="space-y-3">
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 hover:border-red-500/50 transition-all cursor-pointer glass">
                            <div class="flex gap-4 items-center">
                                <img src="https://i.imgur.com/63wXR9V.png" class="w-24 h-16 rounded-lg object-contain bg-white p-1" alt="A220-100" onerror="this.src='https://placehold.co/100x100/333/fff?text=A220'">
                                <div class="flex-grow">
                                    <h3 class="font-bold text-sm">Airbus A220-100</h3>
                                    <div class="grid grid-cols-2 gap-2 mt-2">
                                        <div class="text-[9px] text-slate-400"><i class="fa-solid fa-location-arrow mr-1"></i> 6,700 km</div>
                                        <div class="text-[9px] text-slate-400"><i class="fa-solid fa-users mr-1"></i> 135</div>
                                        <div class="text-[9px] text-slate-400"><i class="fa-solid fa-box-open mr-1"></i> Available: 0</div>
                                        <div class="text-[9px] text-emerald-400 font-bold"><i class="fa-solid fa-coins mr-1"></i> $72,800K</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 hover:border-red-500/50 transition-all cursor-pointer glass">
                            <div class="flex gap-4 items-center">
                                <img src="https://i.imgur.com/IYbDJGb.png" class="w-24 h-16 rounded-lg object-contain bg-white p-1" alt="A220-300" onerror="this.src='https://placehold.co/100x100/333/fff?text=A220'">
                                <div class="flex-grow">
                                    <h3 class="font-bold text-sm">Airbus A220-300</h3>
                                    <div class="grid grid-cols-2 gap-2 mt-2">
                                        <div class="text-[9px] text-slate-400"><i class="fa-solid fa-location-arrow mr-1"></i> 6,300 km</div>
                                        <div class="text-[9px] text-slate-400"><i class="fa-solid fa-users mr-1"></i> 160</div>
                                        <div class="text-[9px] text-slate-400"><i class="fa-solid fa-box-open mr-1"></i> Available: 0</div>
                                        <div class="text-[9px] text-emerald-400 font-bold"><i class="fa-solid fa-coins mr-1"></i> $81,200K</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="toastContainer" class="absolute bottom-10 left-0 right-0 px-6 pointer-events-none z-50 flex justify-center">
            <div id="toastContent" class="hidden bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl shadow-2xl text-xs font-medium"></div>
        </div>
    </div>

    <script>
        function toggleView() {
            document.getElementById('view-main').classList.toggle('hidden');
            document.getElementById('view-sell').classList.toggle('hidden');
            document.getElementById('view-sell').classList.toggle('flex');
        }
        function toggleGroup(id) { document.getElementById(id).classList.toggle('hidden'); }
        function showToast(msg) {
            const el = document.getElementById('toastContent');
            el.innerText = msg; el.classList.remove('hidden', 'notification-toast');
            void el.offsetWidth; el.classList.add('notification-toast');
            setTimeout(() => el.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>
